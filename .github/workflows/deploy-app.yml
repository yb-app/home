name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        working-directory: app
        run: npm install

      - name: Build
        working-directory: app
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
          destination_dir: app
          keep_files: true

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          git reset --hard origin/main
          cp -r app/dist/assets app/assets
          cp -f app/dist/index.html app/index.html
          git add app/assets/ app/index.html
          git commit -m "build: update assets" || echo "nothing"
          git push origin main --force
